# Bind reload key -> Ctrl+s r
unbind r
bind r source-file ~/.tmux.conf


# Turn on mouse support for easy navagation through panels
set -g mouse on


# Set 'leader' key / prefix to Ctrl+S, as in "[S]ession"
set -g prefix C-s
unbind C-b
bind C-s send-prefix


# Put TMux status bar in top so it doesn't get in the way of Neovim
set -g status-position top


# Set vi keybindings
set -g mode-keys vi
set -g status-keys vi


# Navigate through panels
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# Plugins
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @plugin 'catppuccin/tmux#latest'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @catppuccin_flavor 'mocha'


# Catpuccin theme
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory gitmux date_time session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_date_time_text "%d/%m/%y %H:%M"

set -g @catppuccin_directory_text "#{pane_current_path}"
set -g @catppuccin_pane_border_style "fg=#{thm_gray},bg=#{thm_bg}" # Use a value compatible with the standard tmux 'pane-border-style'
set -g @catppuccin_pane_active_border_style "fg=#{thm_orange},bg=#{thm_bg}" # Use a value compatible with the standard tmux 'pane-border-active-style'

#set -g pane-border-status off
#set -g pane-border-format " "
#set -g pane-border-style fg=default,bg=default



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

general {
	ignore_empty_input = true
	hide_cursor = true
}

background {
    monitor = DP-1
    path = /home/manfredo/.config/hypr/conf/lock-wallpaper/Lilith.jpg  # supports png, jpg, webp (no animations, though)
    color = rgba(25, 20, 20, 1.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 0 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

background {
    monitor = HDMI-A-1
    path = /home/manfredo/.config/hypr/conf/lock-wallpaper/Inarius.jpg   # supports png, jpg, webp (no animations, though)
    color = rgba(25, 20, 20, 1.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 0 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 750, 220
    color = rgba(12, 12, 12, 0.3)
    rounding = 10
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    blur_passes = 3
    blur_size = 10
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0

    position = 0, 30 
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_timeout = 2000 # milliseconds before fail_text and fail_color disappears
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = 0
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = Hello there, $USER!
    text_align = center # center/right or any value for default left. multi-line text alignment inside label container
    color = rgba(255, 255, 255, 1.0)
    font_size = 25
    font_family = RobotoMonoNerdFont
    rotate = 0 # degrees, counter-clockwise
    position = 0, 100
    halign = center
    valign = center
    shadow_passes=2
    shadow_size=2
    shadow_color=rgba(0, 0, 0, 0.8)
}

label {
	monitor =
	text = cmd[update:60000] echo "<span font='FiraMonoNerdFont 14'><big>$(date +"%A, %d/%B/%Y, %R")</big></span>"
	text_align = center
	color = rgba(255, 255, 255, 1.0)
	rotate = 0
	position = 0, 50
	halign = center
	valign = center
	shadow_passes=2
	shadow_size=2
	shadow_color=rgba(0, 0, 0, 0.8)
}

# Wallpaper configurations
$monitor1 = DP-1
$monitor2 = HDMI-A-1

preload = ~/.config/hypr/wallpapers/The_Witcher/Geralt_TW3.jpg
preload = ~/.config/hypr/wallpapers/The_Witcher/Siri_TW3.jpg

wallpaper = $monitor1,~/.config/hypr/wallpapers/The_Witcher/Geralt_TW3.jpg
wallpaper = $monitor2,~/.config/hypr/wallpapers/The_Witcher/Siri_TW3.jpg

unload all

splash = true

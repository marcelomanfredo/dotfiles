# Window
windowrule = match:class (.*), suppress_event maximize # you'll probably like this.
windowrule = match:workspace 1|3, monitor $monitor1
windowrule = match:workspace 2|4|6, monitor $monitor2
windowrule = workspace 1, match:class .*ghostty
windowrule = workspace 2, match:class firefox
windowrule = workspace 3, match:class steam.*, tile on
windowrule = workspace 4, match:class google-chrome
windowrule = workspace 5, match:class bruno
windowrule = workspace 6, match:class DBeaver
windowrule = workspace 7, match:class gimp
windowrule = workspace 9, match:class discord
windowrule = opaque 1, match:class firefox|discord|steam|gimp
windowrule = opaque 1, match:fullscreen true, match:class negative:.*ghostty
windowrule = float on, match:class (^qalc.*)

# Workspace
workspace = 1, monitor:$monitor1, persistent:true, default:true, layout:master
workspace = 2, monitor:$monitor2, persistent:true, gapsin:0, gapsout:1, rounding:false, default:true
workspace = 3, monitor:$monitor1, decorate:false
workspace = 4, monitor:$monitor2, decorate:false
workspace = 5, monitor:$monitor2, decoreta:false
workspace = 6, monitor:$monitor2, decoreta:false
workspace = 7, monitor:$monitor2, decoreta:false
workspace = 9, monitor:$monitor2, gapsin:0, gapsout:1, rounding:false

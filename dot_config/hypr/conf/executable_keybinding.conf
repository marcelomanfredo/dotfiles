################################################################################
$mainmod = super # set "win" as main modifier

# QoL
bind = $mainmod, q, killactive,
bind = $mainmod, m, exit, # Exit Hyprland session
bind = $mainmod, f, fullscreen,
bind = $mainmod shift, v, togglefloating,
bind = $mainmod shift, p, pseudo, # dwindle
bind = $mainmod shift, t, togglesplit, # dwindle -> toggle between vertical and horizontal splits
bind = , Print, exec, slurp | grim -g - - | wl-copy -t image/png

# Master layout (workspace 1)
bind = $mainmod, s, layoutmsg, swapwithmaster ignoremaster
bind = $mainmod, a, layoutmsg, addmaster
bind = $mainmod, d, layoutmsg, removemaster

# Apps
bind = $mainmod, RETURN, exec, $terminal
bind = $mainmod, r, exec, $menu
bind = $mainmod, v, exec, $cliphist # list of clipboard history
bind = $mainmod alt, p, exec, hyprpicker -an
bind = $mainmod alt, q, exec, wlogout
bind = $mainmod alt, l, exec, hyprlock
bind = $mainmod shift, x, exec, $sql
bind = $mainmod shift, b, exec, $browser
bind = $mainmod shift, i, exec, $gimp
bind = $mainmod shift, c, exec, $calc
bind = $mainmod shift, g, exec, google-chrome-stable --ozone-platform=wayland --disable-gpu-driver-bug-workarounds --use-gl=egl --disable-direct-composition
bind = $mainmod shift, d, exec, $discord
bind = $mainmod shift, s, exec, steam
bind = $mainmod shift, w, exec, ~/.config/waybar/launch.sh # reload waybar if necessary

# Resize active window
binde = $mainmod, left	, resizeactive, -5%  0
binde = $mainmod, right	, resizeactive,  5%  0
binde = $mainmod, up	, resizeactive,  0   5%
binde = $mainmod, down	, resizeactive,  0  -5%

# Move focus with vim motions (hjkl)
bind = $mainmod, h, movefocus, l
bind = $mainmod, l, movefocus, r
bind = $mainmod, k, movefocus, u
bind = $mainmod, j, movefocus, d

# Move active window in a direction (hjkl)
bind = $mainmod shift, h, movewindow, l
bind = $mainmod shift, l, movewindow, r
bind = $mainmod shift, k, movewindow, u
bind = $mainmod shift, j, movewindow, d

# Switch workspaces
bind = $mainmod, 1, workspace, 1
bind = $mainmod, 2, workspace, 2
bind = $mainmod, 3, workspace, 3
bind = $mainmod, 4, workspace, 4
bind = $mainmod, 5, workspace, 5
bind = $mainmod, 6, workspace, 6
bind = $mainmod, 7, workspace, 7
bind = $mainmod, 8, workspace, 8
bind = $mainmod, 9, workspace, 9
bind = $mainmod, 0, workspace, 10

# Move active window to a workspace
bind = $mainmod shift, 1, movetoworkspace, 1
bind = $mainmod shift, 2, movetoworkspace, 2
bind = $mainmod shift, 3, movetoworkspace, 3
bind = $mainmod shift, 4, movetoworkspace, 4
bind = $mainmod shift, 5, movetoworkspace, 5
bind = $mainmod shift, 6, movetoworkspace, 6
bind = $mainmod shift, 7, movetoworkspace, 7
bind = $mainmod shift, 8, movetoworkspace, 8
bind = $mainmod shift, 9, movetoworkspace, 9
bind = $mainmod shift, 0, movetoworkspace, 10

# Move current workspace to a different monitor
bind = $mainmod alt, 1, movecurrentworkspacetomonitor, $monitor1
bind = $mainmod alt, 2, movecurrentworkspacetomonitor, $monitor2

# Scroll through existing workspaces with mouse scroll
bind = $mainmod, mouse_down, workspace, e+1
bind = $mainmod, mouse_up, workspace, e-1

# Move/Resize window with mouse buttons and dragging
bindm = $mainmod, mouse:272, movewindow
bindm = $mainmod, mouse:273, resizewindow

# Media controls (Corsair K95 Platinum)
bindl = $mainmod, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # mute microphone
bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainmod, XF86AudioRaiseVolume, exec, wpctl set-volume -l 2 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
